name: Build and Deploy

on:
  push:
    branches:
      - master

  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after build?"
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        run: make docker
        env:
          PERP_ADDRESS: ${{ secrets.PERP_ADDRESS }}
          USDC_ADDRESS: ${{ secrets.USDC_ADDRESS }}
          PRICE_FEED_ADDRESS: ${{ secrets.PRICE_FEED_ADDRESS }}
          CHAIN_ID: ${{ secrets.CHAIN_ID }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          RPC_URL: ${{ secrets.RPC_URL }}
          NEXT_PUBLIC_MARKET_SYMBOL: ${{ secrets.NEXT_PUBLIC_MARKET_SYMBOL }}

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' || github.event.inputs.deploy == 'yes'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: ${{ secrets.DEPLOY_SCRIPT }}
