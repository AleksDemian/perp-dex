services:
  indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_PATH: /data/app.db
      PERP_ADDRESS: ${PERP_ADDRESS}
      PRICE_FEED_ADDRESS: ${PRICE_FEED_ADDRESS}
      RPC_URL: ${RPC_URL}
      CONTRACT_DEPLOY_BLOCK: ${CONTRACT_DEPLOY_BLOCK:-0}
      INDEXER_BATCH_SIZE: ${INDEXER_BATCH_SIZE:-2000}
    volumes:
      - app-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PERP_ADDRESS: ${PERP_ADDRESS}
        NEXT_PUBLIC_USDC_ADDRESS: ${USDC_ADDRESS}
        NEXT_PUBLIC_PRICE_FEED_ADDRESS: ${PRICE_FEED_ADDRESS}
        NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID:-11155111}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_RPC_URL: ${RPC_URL}
        NEXT_PUBLIC_MARKET_SYMBOL: ${NEXT_PUBLIC_MARKET_SYMBOL:-BTC-USD}
    depends_on:
      - indexer
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /data/app.db
      NEXT_PUBLIC_PERP_ADDRESS: ${PERP_ADDRESS}
      NEXT_PUBLIC_USDC_ADDRESS: ${USDC_ADDRESS}
      NEXT_PUBLIC_PRICE_FEED_ADDRESS: ${PRICE_FEED_ADDRESS}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID:-11155111}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_RPC_URL: ${RPC_URL}
      NEXT_PUBLIC_MARKET_SYMBOL: ${NEXT_PUBLIC_MARKET_SYMBOL:-BTC-USD}
    volumes:
      - app-data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
